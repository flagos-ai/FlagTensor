name: flagtensor-ci

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Export environment
        run: |
          python tools/export_env.py --project-root . --output ci_results/env.json
      - name: CLI smoke help
        run: |
          python tools/run_flagtensor_ci.py --help
          python tools/run_flagtensor_weekly.py --help
