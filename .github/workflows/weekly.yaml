name: flagtensor-weekly

on:
  workflow_dispatch:
    inputs:
      op_list:
        description: "Path to operator list file"
        required: false
        default: "weekly_op_test.txt"
      gpus:
        description: "GPU ids passed to weekly runner"
        required: false
        default: "0"

jobs:
  weekly-entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Weekly runner help
        run: |
          python tools/run_flagtensor_weekly.py --help
      - name: Upload weekly metadata
        uses: actions/upload-artifact@v4
        with:
          name: flagtensor-weekly-inputs
          path: |
            weekly_op_test.txt
            pyproject.toml
